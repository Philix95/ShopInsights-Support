name: "Frage"
description: "Eine Frage zur Nutzung oder Konfiguration von ShopInsights"
title: "[Frage]: "
labels: ["question", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "Bereich"
      description: "Zu welchem Thema hast du eine Frage?"
      options:
        - Installation / Setup
        - Konfiguration
        - Dashboard / Übersicht
        - Report Builder
        - Produkt-Performance
        - ABC-Analyse
        - Bestandsoptimierung
        - Kompatibilität
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: "Deine Frage"
      description: "Beschreibe möglichst genau, was du wissen möchtest."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Kontext"
      description: "Weitere Informationen, die für die Beantwortung hilfreich sein könnten."
      placeholder: "z.B. Shopware-Version, Plugin-Version, Screenshots ..."
    validations:
      required: false

