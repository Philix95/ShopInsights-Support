name: Issue Triage & Draft Response

# Trigger: runs when a new issue is opened
on:
  issues:
    types: [opened]

# Permissions needed to read/write issues and labels
permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:

      # -------------------------------------------------------
      # Step 1: Checkout repository (includes docs/ folder)
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Triage issue with Claude API
      # -------------------------------------------------------
      - name: Triage issue with Claude API
        id: triage
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // --- Collect issue data ---
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const issueBody = issue.body || '';
            const issueAuthor = issue.user.login;
            const issueLabels = issue.labels.map(l => l.name);

            // --- Load docs/ content as knowledge base ---
            let docsContent = 'Keine Dokumentation verfügbar.';
            const docsDir = path.join(process.env.GITHUB_WORKSPACE, 'docs');

            try {
              if (fs.existsSync(docsDir)) {
                const docFiles = fs.readdirSync(docsDir)
                  .filter(f => f.endsWith('.md'));

                const docPages = docFiles.map(f => {
                  const content = fs.readFileSync(path.join(docsDir, f), 'utf8');
                  const pageName = f.replace('.md', '').replace(/-/g, ' ');
                  return `### ${pageName}\n${content}`;
                });

                if (docPages.length > 0) {
                  docsContent = docPages.join('\n\n---\n\n');
                }
              }
            } catch (e) {
              core.warning(`Could not load docs: ${e.message}`);
            }

            // --- Fetch existing issues for duplicate check ---
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
              sort: 'updated',
              direction: 'desc'
            });

            const existingIssues = allIssues
              .filter(i => i.number !== issueNumber)
              .map(i => ({
                number: i.number,
                title: i.title,
                labels: i.labels.map(l => l.name),
                state: i.state,
                milestone: i.milestone ? i.milestone.title : null
              }));

            // --- Fetch milestones for roadmap check ---
            const { data: rawMilestones } = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'due_on',
              direction: 'asc'
            });

            const milestones = rawMilestones.map(m => ({
              title: m.title,
              description: m.description,
              state: m.state,
              due_on: m.due_on
            }));

            // --- Build prompt ---
            const docsBaseUrl = 'https://github.com/Philix95/ShopInsights-Support/blob/main/docs';

            const prompt = `Du bist der Support-Assistent für das Shopware 6 Plugin "ShopInsights".
            Analysiere das folgende neue Issue und erstelle eine Antwort.

            === NEUES ISSUE ===
            Titel: ${issueTitle}
            Erstellt von: ${issueAuthor}
            Labels: ${JSON.stringify(issueLabels)}

            Inhalt:
            ${issueBody}

            === BESTEHENDE ISSUES ===
            ${JSON.stringify(existingIssues, null, 2)}

            === MILESTONES (ROADMAP) ===
            ${JSON.stringify(milestones, null, 2)}

            === DOKUMENTATION / FAQ (Wissensbasis) ===
            ${docsContent}

            Basis-URL für Doku-Verweise: ${docsBaseUrl}

            === DEINE AUFGABEN ===

            1. KATEGORISIERUNG: Bestimme die Kategorie (bug, enhancement, question).
               Beachte: Das Issue hat möglicherweise schon Labels aus dem Template.

            2. ANALYSE je nach Kategorie:
               - Bug: Prüfe ob ein ähnliches Issue existiert (Duplikat-Check).
                 Wenn ja: Nenne die Issue-Nummer des Duplikats.
                 Wenn nein: Es ist ein neuer Bug.
               - Feature Request: Prüfe ob das Feature in den Milestones/Issues geplant ist.
                 Wenn ja: Nenne den Milestone und ungefähren Zeitrahmen.
                 Wenn nein: Es ist ein neuer Feature-Wunsch.
               - Frage: Versuche die Frage basierend auf der Dokumentation und dem
                 Plugin-Kontext zu beantworten. Verweise auf die passende Doku-Seite
                 mit einem Link im Format:
                 ${docsBaseUrl}/dateiname.md

            3. ANTWORT-ENTWURF: Schreibe eine freundliche, professionelle Antwort.
               - Sprache: Erkenne die Sprache des Issues und antworte in derselben Sprache.
               - Sprich den Autor mit @${issueAuthor} an.
               - Bei Duplikaten: Verweise auf das bestehende Issue mit #nummer.
               - Bei geplanten Features: Nenne den Milestone und Status.
               - Bei neuen Bugs/Features: Bedanke dich und erkläre die nächsten Schritte.
               - Bei Fragen: Gib eine hilfreiche Antwort basierend auf der Dokumentation
                 und verweise auf die passende Doku-Seite.
               - Unterschreibe mit: "— ShopInsights Support (automatisch generiert, Freigabe ausstehend)"

            4. LABELS: Schlage passende Labels vor aus dieser Liste:
               Priorität: priority:low, priority:medium, priority:high
               Status: status:known, status:planned, status:draft-response
               Bereich: area:dashboard, area:report-builder, area:product-performance,
                        area:abc-analysis, area:inventory, area:installation

            Antworte AUSSCHLIESSLICH in diesem JSON-Format, ohne Markdown-Backticks:
            {
              "category": "bug|enhancement|question",
              "is_duplicate": true/false,
              "duplicate_of": null,
              "is_planned": true/false,
              "planned_milestone": null,
              "suggested_labels": ["label1", "label2"],
              "draft_response": "Dein Antwort-Entwurf hier",
              "internal_note": "Kurze interne Notiz für Felix zur Einordnung"
            }`;

            // --- Call Claude API ---
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              core.setFailed(`Claude API error (${response.status}): ${errorText}`);
              return;
            }

            const data = await response.json();
            const rawText = data.content[0].text;

            // --- Parse response ---
            let parsed;
            try {
              const cleaned = rawText.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
              parsed = JSON.parse(cleaned);
            } catch (e) {
              core.setFailed(`Failed to parse Claude response: ${e.message}\nRaw: ${rawText}`);
              return;
            }

            // --- Apply labels ---
            const labels = parsed.suggested_labels || [];
            if (!labels.includes('status:draft-response')) {
              labels.push('status:draft-response');
            }

            // Remove triage label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'triage'
              });
            } catch (e) {
              // Label might not exist, that's ok
            }

            // Add new labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: labels
            });

            // --- Post draft response as collapsed comment ---
            const isDuplicate = parsed.is_duplicate === true;
            const duplicateOf = parsed.duplicate_of;

            let comment = `### 🤖 Automatische Triage\n\n`;
            comment += `**Kategorie:** ${parsed.category}\n`;

            if (isDuplicate && duplicateOf) {
              comment += `**Duplikat von:** #${duplicateOf}\n`;
            }

            comment += `\n> **Interne Notiz:** ${parsed.internal_note}\n\n`;
            comment += `<details>\n`;
            comment += `<summary>📝 <strong>Antwort-Entwurf</strong> (aufklappen zum Prüfen)</summary>\n\n`;
            comment += `---\n\n`;
            comment += parsed.draft_response;
            comment += `\n\n---\n\n`;
            comment += `</details>\n\n`;
            comment += `*Zum Freigeben: Entwurf aufklappen, Inhalt kopieren und als neuen Kommentar posten. `;
            comment += `Danach das Label \`status:draft-response\` entfernen.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            // --- If duplicate, note on original issue ---
            if (isDuplicate && duplicateOf && !isNaN(parseInt(duplicateOf))) {
              const dupNote = `📌 Weitere Meldung zu diesem Thema von @${issueAuthor} in #${issueNumber}.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(duplicateOf),
                body: dupNote
              });
            }

            core.info(`Triage complete for issue #${issueNumber}: ${parsed.category}`);